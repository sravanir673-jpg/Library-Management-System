{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Available Books</h2>

    <table class="table table-bordered table-striped">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
        </tr>

        {% for book in books %}
        <tr>
            <td>
                <a href="/book/{{ book.id }}/">
                    {{ book.title }}
                </a>
            </td>
            <td>{{ book.author }}</td>
            <td>
                {% if book.available %}
                Available
                {% else %}
                Issued
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
